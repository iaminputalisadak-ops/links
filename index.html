<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HEDZTech — Connect With Us</title>
  <meta name="description" content="HEDZTech — Web development, UI/UX design, SEO, and digital marketing. Find all our links here." />
  <meta property="og:title" content="HEDZTech — Connect With Us" />
  <meta property="og:description" content="Professional digital products & growth. Find all our contact and social links." />
  <meta name="theme-color" content="#080a10" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080a10;
      --bg2: #0f1220;
      --bg3: #171b2e;
      --accent: #4fc3f7;
      --accent2: #7c6fff;
      --text: #f0f4ff;
      --muted: #8892b0;
      --border: rgba(255,255,255,0.07);
      --card-hover: rgba(79,195,247,0.06);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1rem 4rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Atmospheric background */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(ellipse, rgba(124,111,255,0.12) 0%, rgba(79,195,247,0.06) 40%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(79,195,247,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 3.5rem 0 2rem;
      animation: fadeUp 0.7s ease both;
    }

    .logo-img-wrap {
      width: 130px;
      height: 130px;
      border-radius: 24px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      box-shadow: 0 0 40px rgba(79,195,247,0.25), 0 0 80px rgba(79,195,247,0.08);
      overflow: hidden;
      padding: 8px;
    }

    .logo-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 0.92rem;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 1.5rem 0;
    }

    /* Section label */
    .section-label {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      width: 100%;
      margin-bottom: 0.75rem;
      padding-left: 0.25rem;
    }

    /* Link cards */
    .links-stack {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.9rem 1.1rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, background 0.2s, transform 0.18s;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.6s ease both;
    }

    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--card-hover);
      opacity: 0;
      transition: opacity 0.2s;
      border-radius: inherit;
    }

    .link-card:hover {
      border-color: rgba(79,195,247,0.25);
      transform: translateY(-2px);
    }

    .link-card:hover::before { opacity: 1; }

    .link-card:active { transform: translateY(0) scale(0.99); }

    .icon-wrap {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-wrap svg {
      width: 22px;
      height: 22px;
    }

    .link-info { flex: 1; min-width: 0; }

    .link-name {
      font-family: 'Syne', sans-serif;
      font-size: 0.97rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      display: block;
    }

    .link-desc {
      font-size: 0.78rem;
      color: var(--muted);
      display: block;
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .arrow {
      color: var(--muted);
      flex-shrink: 0;
      transition: color 0.2s, transform 0.2s;
    }

    .link-card:hover .arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    /* Brand colors */
    .icon-web   { background: rgba(79,195,247,0.12); }
    .icon-wa    { background: rgba(37,211,102,0.12); }
    .icon-fb    { background: rgba(24,119,242,0.12); }
    .icon-ig    { background: rgba(228,64,95,0.12); }
    .icon-li    { background: rgba(10,102,194,0.12); }
    .icon-tt    { background: rgba(255,0,80,0.12); }
    .icon-email { background: rgba(124,111,255,0.12); }

    /* Stagger delays */
    .link-card:nth-child(1) { animation-delay: 0.1s; }
    .link-card:nth-child(2) { animation-delay: 0.15s; }
    .link-card:nth-child(3) { animation-delay: 0.2s; }
    .link-card:nth-child(4) { animation-delay: 0.25s; }
    .link-card:nth-child(5) { animation-delay: 0.3s; }
    .link-card:nth-child(6) { animation-delay: 0.35s; }
    .link-card:nth-child(7) { animation-delay: 0.4s; }

    /* Footer */
    .footer {
      margin-top: 2.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      animation: fadeUp 0.7s ease 0.5s both;
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header { animation-delay: 0s; }

    /* Responsive */
    @media (max-width: 400px) {
      .brand-name { font-size: 1.7rem; }
      .link-card { padding: 0.8rem 0.9rem; }
      .icon-wrap { width: 40px; height: 40px; border-radius: 9px; }
    }
  </style>
</head>
